services:
  nestjs_postgres_test:
    image: postgres:17-alpine
    container_name: nestjs_postgres_test
    restart: 'no'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $POSTGRES_USER']
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env.test
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - '5444:5432'
    volumes:
      - nestjs_postgres_test:/var/lib/postgresql/data

  nestjs_redis_test:
    image: redis:alpine
    container_name: nestjs_redis_test
    ports:
      - '6380:6379'
    volumes:
      - nestjs_redis_test:/data

networks:
  default:
    name: nestjs_starter_test

volumes:
  nestjs_postgres_test:
  nestjs_redis_test:
